# =============================================================================
# Fenrir -- Wine Tuning Profile: OnlineFix
# =============================================================================
#
# Applied to games detected as OnlineFix cracks. OnlineFix patches enable
# LAN and online multiplayer through Steam emulation, so they ship custom
# steamclient DLLs that need special handling.
#
# See docs/dev/profiles-guide.md for the full format reference.
# =============================================================================

[profile]
name = "onlinefix"
description = "Profile for OnlineFix cracked games"

[wine]
windows_version = "win10"

# OnlineFix ships multiple native DLLs that must override Wine's builtins:
# - steam_api / steam_api64 / steamclient / steamclient64: Steam API emulation
# - OnlineFix64 / SteamOverlay64: core OnlineFix multiplayer and overlay hooks
# - winmm / winhttp: native-first so OnlineFix can intercept them for relay
# - dnet: DirectNet used by some titles for peer-to-peer session data
# The "n,b" suffix means "native first, fall back to builtin" — safer than pure
# "n" because Wine keeps working if the native DLL is missing for this title.
dll_overrides = [
    "steam_api=n,b", "steam_api64=n,b",
    "steamclient=n,b", "steamclient64=n,b",
    "OnlineFix64=n,b", "SteamOverlay64=n,b",
    "winmm=n,b", "dnet=n", "winhttp=n,b",
]

[env]
# OnlineFix sometimes hits OpenSSL issues on certain CPU instruction sets.
# This environment variable disables the problematic AVX instruction that
# causes crashes in some configurations.
OPENSSL_ia32cap = "~0x20000000"

[features]
dxvk = true
vkd3d = false
esync = true
fsync = true
