# =============================================================================
# Fenrir -- GOG Game Detection Signatures
# =============================================================================
#
# Patterns for detecting GOG games and rips. GOG games ship without DRM by
# default; these signatures identify the GOG-specific metadata files and
# directory structures left by the installer or GOG Galaxy client.
# =============================================================================

# GOG game identified by the per-game metadata .info file.
# GOG installers write goggame-<appid>.info to the install directory, paired with
# a goggame-<appid>.hashdb for integrity checks. commonappdata/ and __redist/
# are dropped by the offline installer in the install root.
# auto_add_threshold = 30: goggame-*.info alone is a sufficiently specific marker.
[gog_info]
name = "GOG"
store = "GOG"
crack_type = "GOGRip"
auto_add_threshold = 30
required_files = ["goggame-*.info"]
optional_files = ["goggame-*.hashdb"]
confidence_boost = ["commonappdata/", "__redist/", "support/", "gog.ico"]

# GOG Galaxy client -- identified by GalaxyClient.dll.
# Present when the game was installed through the GOG Galaxy launcher.
[gog_galaxy]
name = "GOG Galaxy"
store = "GOG"
crack_type = "GOGRip"
required_files = ["GalaxyClient.dll"]
optional_files = ["goggame-*.info"]
confidence_boost = ["Galaxy64.dll"]

# GOG offline installer residue -- identified by game.id.
# GOG offline installers write a game.id file to the install root.
# The support/ directory contains GOG helper scripts.
[gog_installer]
name = "GOG Installer"
store = "GOG"
crack_type = "GOGRip"
required_files = ["game.id"]
optional_files = ["start.sh", "gameinfo"]
confidence_boost = ["support/gog-*.sh"]
