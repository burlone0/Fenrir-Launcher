# =============================================================================
# Fenrir -- Game Detection Signatures
# =============================================================================
#
# This file defines patterns that Fenrir uses to identify games and classify
# their type (crack, repack, scene release, etc.) during a directory scan.
#
# HOW IT WORKS:
# Fenrir walks a game directory and checks for the presence of specific files
# and folders. Each signature defines a set of required, optional, and boost
# files. If all required files are present, the game is a candidate. Optional
# and boost matches increase the confidence score.
#
# SCORING:
#   required_files  -> +30 points each (ALL must be present or score is 0)
#   optional_files  -> +15 points each
#   confidence_boost -> +10 points each
#
# THRESHOLDS:
#   >= 60 points  -> high confidence, auto-added to library
#   30-59 points  -> needs user confirmation
#   < 30 points   -> ignored
#
# FILE PATTERNS:
#   "filename.ext"  -> exact file match (case-insensitive fallback)
#   "dirname/"      -> directory match (trailing slash required)
#   "*.ext"         -> glob pattern match
#
# To add a new signature, create a new [section] with a unique key.
# See docs/dev/signatures-guide.md for the full guide.
# =============================================================================

# Generic Steam crack -- catches most cracks that ship steam_api.dll.
# This is the broadest pattern and acts as a fallback when more specific
# signatures (OnlineFix, FitGirl, etc.) don't match.
[steam_generic]
name = "Steam Generic Crack"
store = "Steam"
required_files = ["steam_api.dll"]
optional_files = ["steam_api64.dll", "steam_appid.txt"]
confidence_boost = ["steam_emu.ini", "cream_api.ini"]

# Generic Steam crack for 64-bit only games -- covers modern titles that ship
# steam_api64.dll without the 32-bit steam_api.dll counterpart.
[steam_generic_64]
name = "Steam Generic Crack (64-bit)"
store = "Steam"
required_files = ["steam_api64.dll"]
optional_files = ["steam_api.dll", "steam_appid.txt"]
confidence_boost = ["steam_emu.ini", "cream_api.ini"]

# OnlineFix -- identified by OnlineFix.ini, the crack config required for execution.
# OnlineFix.url is a website shortcut that users routinely delete; it must not be
# required. These cracks often include custom steamclient DLLs and a steam_settings/
# directory for LAN/online play emulation.
[onlinefix]
name = "OnlineFix"
store = "Steam"
crack_type = "OnlineFix"
auto_add_threshold = 30
required_files = ["OnlineFix.ini"]
optional_files = ["OnlineFix64.dll", "OnlineFix.url", "steamclient.dll"]
confidence_boost = ["steam_settings/"]
cleanup_files = ["OnlineFix.url", "_Redist/", "setup.exe", "autorun.inf", "*.url"]

# FitGirl Repack -- identified by the fitgirl-repacks.site marker file.
# FitGirl repacks are heavily compressed; the game directory looks like
# a normal Steam crack after installation.
[fitgirl]
name = "FitGirl Repack"
store = "Steam"
crack_type = "FitGirl"
required_files = ["fitgirl-repacks.site"]
optional_files = ["md5.txt"]
confidence_boost = ["steam_api.dll"]
cleanup_files = ["fitgirl-repacks.site.url", "_CommonRedist/", "setup.exe", "autorun.inf", "*.url"]

# DODI Repack -- identified by the "DODI Repacks/" marker directory.
# Similar to FitGirl, the installed game is a standard Steam crack
# with additional redistribuable folders.
[dodi]
name = "DODI Repack"
store = "Steam"
crack_type = "DODI"
required_files = ["DODI Repacks/"]
optional_files = ["_Redist/"]
confidence_boost = ["steam_api.dll"]
cleanup_files = ["_Redist/", "_CommonRedist/", "setup.exe", "autorun.inf", "*.url"]

# Scene release -- identified by the presence of an .nfo file.
# Scene releases sometimes split the game across multiple disc directories.
# No store is assumed since scene releases can come from any source.
[scene]
name = "Scene Release"
crack_type = "Scene"
required_files = ["*.nfo"]
optional_files = ["cd1/", "cd2/", "disc1/"]

# Goldberg Steam Emulator -- identified by the steam_settings/ directory.
# Goldberg replaces the Steam API with a LAN/offline emulator; the directory
# contains account name, app ID, DLC lists, and local save config.
[goldberg]
name = "Goldberg Steam Emu"
store = "Steam"
crack_type = "OnlineFix"
required_files = ["steam_settings/"]
optional_files = ["steam_api.dll", "steam_api64.dll"]
confidence_boost = ["steam_settings/account_name.txt", "local_save.txt"]

# CreamAPI -- a DLC unlocker that replaces the Steam API while keeping the
# original Steam client active. Identified by cream_api.ini.
[creamapi]
name = "CreamAPI"
store = "Steam"
required_files = ["cream_api.ini"]
optional_files = ["steam_api.dll", "steam_api64.dll"]
confidence_boost = ["steam_appid.txt"]

# CODEX release -- identified by codex.nfo, the Scene group's info file.
# CODEX cracks usually ship a separate crack/ directory alongside the game.
[codex]
name = "CODEX"
store = "Steam"
crack_type = "Scene"
required_files = ["codex.nfo"]
optional_files = ["steam_api.dll", "crack/"]
confidence_boost = ["codex64.dll"]

# PLAZA release -- identified by plaza.nfo.
[plaza]
name = "PLAZA"
store = "Steam"
crack_type = "Scene"
required_files = ["plaza.nfo"]
optional_files = ["steam_api.dll"]
confidence_boost = []

# EMPRESS release -- identified by empress.nfo.
# EMPRESS cracks often ship a 64-bit DLL alongside the nfo.
[empress]
name = "EMPRESS"
store = "Steam"
crack_type = "Scene"
required_files = ["empress.nfo"]
optional_files = ["steam_api.dll", "steam_api64.dll"]
confidence_boost = ["empress64.dll"]

# AnkerGames -- identified by an "AnkerGames*.url" shortcut bundled with every release.
# The exact filename varies (e.g. "AnkerGames.url", "AnkerGames - Free Pre-installed PC Games.url"),
# so a glob is required. Similar to OnlineFix, uses steam_settings/ for LAN emulation.
[ankergames]
name = "AnkerGames"
store = "Steam"
crack_type = "OnlineFix"
auto_add_threshold = 30
required_files = ["AnkerGames*.url"]
optional_files = ["steam_api.dll", "steam_api64.dll"]
confidence_boost = ["steam_settings/"]
cleanup_files = ["AnkerGames*.url", "_Redist/", "_CommonRedist/", "autorun.inf", "*.url"]

# unsteam -- DRM bypass that hooks the Steam API at load time via unsteam.dll/unsteam.ini.
# Used in pre-installed releases where the game ships with no steam_api*.dll replacement.
# Markers are often buried in Binaries/Win64/ for Unreal Engine titles.
# auto_add_threshold = 30: unsteam.ini is sufficiently specific to auto-add.
[unsteam]
name = "unsteam"
store = "Steam"
crack_type = "Unsteam"
auto_add_threshold = 30
required_files = ["unsteam.ini"]
optional_files = ["unsteam.dll", "steam_appid.txt"]
confidence_boost = []

# ColdClientLoader -- an alternative Steam API bypass by jiang0681 that loads a custom
# steamclient64.dll via a dedicated loader. Identified by ColdClientLoader.ini, which
# is always present and contains the loader configuration. Different from unsteam (@emberantz).
[cold_client_loader]
name = "ColdClientLoader"
store = "Steam"
crack_type = "Unsteam"
auto_add_threshold = 30
required_files = ["ColdClientLoader.ini"]
optional_files = ["steamclient_loader.exe", "steamclient64.dll", "steamclient.dll"]
confidence_boost = []

# SteamRIP release -- identified by the "STEAMRIP » Free Pre-installed Steam Games.url"
# shortcut bundled with every release. The » character is U+00BB.
# auto_add_threshold = 30: the URL file alone is a sufficiently specific identifier.
[steamrip]
name = "SteamRIP"
store = "Steam"
crack_type = "SteamRIP"
auto_add_threshold = 30
required_files = ["STEAMRIP » Free Pre-installed Steam Games.url"]
optional_files = ["Read_Me_Instructions.txt", "steam_api.dll", "steam_api64.dll", "steam_appid.txt"]
confidence_boost = []

# AstralGames release -- identified by "AstralGames ~ Pre-Installed Games.url", a website
# shortcut bundled with every release. AstralGames distributes pre-installed Steam games
# similarly to SteamRIP; the marker file is sufficiently specific to auto-add.
[astral_games]
name = "AstralGames"
store = "Steam"
crack_type = "OnlineFix"
auto_add_threshold = 30
required_files = ["AstralGames ~ Pre-Installed Games.url"]
optional_files = ["steam_api.dll", "steam_api64.dll", "steam_appid.txt"]
confidence_boost = []

# SmokeAPI -- a DLC unlocker that patches steam_api(64).dll in-place. Identified by
# SmokeAPI.config.json, which is always present next to the patched DLL. On Unreal Engine
# games the file lives in Binaries/Win64/ or Binaries/Win32/ (covered by UE deep scan).
# auto_add_threshold = 30: SmokeAPI.config.json alone is sufficiently specific to auto-add.
[smokeapi]
name = "SmokeAPI"
store = "Steam"
crack_type = "SmokeAPI"
auto_add_threshold = 30
required_files = ["SmokeAPI.config.json"]
optional_files = ["SmokeAPI.log", "steam_api.dll", "steam_api64.dll"]
confidence_boost = []

# Steam pre-installed (DRM-free or BepInEx-modded) -- identified by steam_appid.txt alone.
# Catches DRM-free games published on Steam (e.g. Among Us) that ship no steam_api*.dll.
# When steam_api*.dll is also present a higher-scoring signature wins instead.
# No auto_add_threshold: steam_appid.txt alone is low-specificity, needs manual confirmation.
[steam_appid_only]
name = "Steam Pre-installed"
store = "Steam"
required_files = ["steam_appid.txt"]
optional_files = ["steam_api.dll", "steam_api64.dll"]
confidence_boost = []
