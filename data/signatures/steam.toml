# =============================================================================
# Fenrir -- Game Detection Signatures
# =============================================================================
#
# This file defines patterns that Fenrir uses to identify games and classify
# their type (crack, repack, scene release, etc.) during a directory scan.
#
# HOW IT WORKS:
# Fenrir walks a game directory and checks for the presence of specific files
# and folders. Each signature defines a set of required, optional, and boost
# files. If all required files are present, the game is a candidate. Optional
# and boost matches increase the confidence score.
#
# SCORING:
#   required_files  -> +30 points each (ALL must be present or score is 0)
#   optional_files  -> +15 points each
#   confidence_boost -> +10 points each
#
# THRESHOLDS:
#   >= 60 points  -> high confidence, auto-added to library
#   30-59 points  -> needs user confirmation
#   < 30 points   -> ignored
#
# FILE PATTERNS:
#   "filename.ext"  -> exact file match (case-insensitive fallback)
#   "dirname/"      -> directory match (trailing slash required)
#   "*.ext"         -> glob pattern match
#
# To add a new signature, create a new [section] with a unique key.
# See docs/dev/signatures-guide.md for the full guide.
# =============================================================================

# Generic Steam crack -- catches most cracks that ship steam_api.dll.
# This is the broadest pattern and acts as a fallback when more specific
# signatures (OnlineFix, FitGirl, etc.) don't match.
[steam_generic]
name = "Steam Generic Crack"
store = "Steam"
required_files = ["steam_api.dll"]
optional_files = ["steam_api64.dll", "steam_appid.txt"]
confidence_boost = ["steam_emu.ini", "cream_api.ini"]

# Generic Steam crack for 64-bit only games -- covers modern titles that ship
# steam_api64.dll without the 32-bit steam_api.dll counterpart.
[steam_generic_64]
name = "Steam Generic Crack (64-bit)"
store = "Steam"
required_files = ["steam_api64.dll"]
optional_files = ["steam_api.dll", "steam_appid.txt"]
confidence_boost = ["steam_emu.ini", "cream_api.ini"]

# OnlineFix -- identified by OnlineFix.ini, the crack config required for execution.
# OnlineFix.url is a website shortcut that users routinely delete; it must not be
# required. These cracks often include custom steamclient DLLs and a steam_settings/
# directory for LAN/online play emulation.
[onlinefix]
name = "OnlineFix"
store = "Steam"
crack_type = "OnlineFix"
required_files = ["OnlineFix.ini"]
optional_files = ["OnlineFix64.dll", "OnlineFix.url", "steamclient.dll"]
confidence_boost = ["steam_settings/"]

# FitGirl Repack -- identified by the fitgirl-repacks.site marker file.
# FitGirl repacks are heavily compressed; the game directory looks like
# a normal Steam crack after installation.
[fitgirl]
name = "FitGirl Repack"
store = "Steam"
crack_type = "FitGirl"
required_files = ["fitgirl-repacks.site"]
optional_files = ["md5.txt"]
confidence_boost = ["steam_api.dll"]

# DODI Repack -- identified by the "DODI Repacks/" marker directory.
# Similar to FitGirl, the installed game is a standard Steam crack
# with additional redistribuable folders.
[dodi]
name = "DODI Repack"
store = "Steam"
crack_type = "DODI"
required_files = ["DODI Repacks/"]
optional_files = ["_Redist/"]
confidence_boost = ["steam_api.dll"]

# Scene release -- identified by the presence of an .nfo file.
# Scene releases sometimes split the game across multiple disc directories.
# No store is assumed since scene releases can come from any source.
[scene]
name = "Scene Release"
crack_type = "Scene"
required_files = ["*.nfo"]
optional_files = ["cd1/", "cd2/", "disc1/"]

# Goldberg Steam Emulator -- identified by the steam_settings/ directory.
# Goldberg replaces the Steam API with a LAN/offline emulator; the directory
# contains account name, app ID, DLC lists, and local save config.
[goldberg]
name = "Goldberg Steam Emu"
store = "Steam"
crack_type = "OnlineFix"
required_files = ["steam_settings/"]
optional_files = ["steam_api.dll", "steam_api64.dll"]
confidence_boost = ["steam_settings/account_name.txt", "local_save.txt"]

# CreamAPI -- a DLC unlocker that replaces the Steam API while keeping the
# original Steam client active. Identified by cream_api.ini.
[creamapi]
name = "CreamAPI"
store = "Steam"
required_files = ["cream_api.ini"]
optional_files = ["steam_api.dll", "steam_api64.dll"]
confidence_boost = ["steam_appid.txt"]

# CODEX release -- identified by codex.nfo, the Scene group's info file.
# CODEX cracks usually ship a separate crack/ directory alongside the game.
[codex]
name = "CODEX"
store = "Steam"
crack_type = "Scene"
required_files = ["codex.nfo"]
optional_files = ["steam_api.dll", "crack/"]
confidence_boost = ["codex64.dll"]

# PLAZA release -- identified by plaza.nfo.
[plaza]
name = "PLAZA"
store = "Steam"
crack_type = "Scene"
required_files = ["plaza.nfo"]
optional_files = ["steam_api.dll"]
confidence_boost = []

# EMPRESS release -- identified by empress.nfo.
# EMPRESS cracks often ship a 64-bit DLL alongside the nfo.
[empress]
name = "EMPRESS"
store = "Steam"
crack_type = "Scene"
required_files = ["empress.nfo"]
optional_files = ["steam_api.dll", "steam_api64.dll"]
confidence_boost = ["empress64.dll"]

# AnkerGames -- identified by AnkerGames.url, a website shortcut bundled with
# the crack. Similar to OnlineFix, uses steam_settings/ for LAN emulation.
[ankergames]
name = "AnkerGames"
store = "Steam"
crack_type = "OnlineFix"
required_files = ["AnkerGames.url"]
optional_files = ["steam_api.dll", "steam_api64.dll"]
confidence_boost = ["steam_settings/"]
